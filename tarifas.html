<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEN Yoga | Tarifas</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest" defer></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cocoa: '#26160C',
                        golden: '#B48A47',
                        terracotta: '#D27D60',
                        mutedbrown: '#7F5040',
                        mutedgold: '#A69C6A',
                        beige: '#E6DCC3',
                        ivory: '#F8F6F2',
                        slate: '#708090',
                        sand: '#E6DCC3',
                        olive: '#8C8658'
                    },
                    fontFamily: {
                        serif: ['Ubuntu', 'serif'],
                        sans: ['"Montserrat Arabic"', 'Montserrat', 'sans-serif'],
                        ubuntu: ['Ubuntu', 'sans-serif']
                    }
                }
            }
        };
    </script>
</head>
<body class="subpixel-antialiased min-h-screen w-screen overflow-x-hidden relative selection:bg-mutedgold selection:text-cocoa font-sans bg-[linear-gradient(to_bottom,_#E6DCC3_0%,_#D27D60_40%,_#B48A47_70%,_#8C8658_100%)]">

    <!-- Ambient Background Shapes (Sincronizado con Mi Perfil) -->
    <div id="parallax-bg" class="fixed inset-0 z-0 overflow-hidden pointer-events-none transition-transform duration-1000 ease-out">
        <div class="absolute top-[10%] left-[10%] w-[70vw] h-[70vw] bg-[#D27D60] rounded-full blur-[80px] opacity-20 animate-pulse mix-blend-multiply"></div>
        <div class="absolute bottom-[10%] right-[10%] w-[60vw] h-[60vw] bg-[#B48A47] rounded-full blur-[80px] opacity-20 animate-pulse mix-blend-multiply" style="animation-delay: 2s;"></div>
    </div>

    <div class="min-h-screen flex flex-col items-center p-4 md:p-8 pt-20 md:pt-24 relative z-10 w-full max-w-6xl mx-auto">
        <a href="index.html"
            class="absolute top-6 left-6 z-20 bg-terracotta backdrop-blur-md border border-terracotta text-white px-6 py-3 rounded-xl font-bold text-[10px] md:text-xs uppercase tracking-widest hover:bg-cocoa transition shadow-lg hover:scale-105 active:scale-95 flex items-center gap-2 group">
            <i class="ph-bold ph-arrow-left group-hover:-translate-x-1 transition"></i> Volver a inicio
        </a>

        <div class="w-full bg-white/10 backdrop-blur-xl rounded-3xl p-6 md:p-12 border border-white/20 shadow-2xl mt-12 md:mt-8 text-cocoa">
            <h2 class="brand-font text-3xl md:text-5xl lg:text-7xl text-center text-white mb-8 md:mb-16 drop-shadow-md">
                Tarifas</h2>
            
            <div class="grid lg:grid-cols-3 gap-8 px-4 items-center">
                <!-- Side card -->
                <div class="p-10 border border-white/20 bg-white/30 backdrop-blur-sm text-center rounded-2xl">
                    <h3 class="text-2xl font-serif text-white/90 mb-2">Clase individual</h3>
                    <div class="text-5xl font-serif text-white/80 mb-8">XX€</div>
                </div>
                <!-- CENTRAL CARD — Most prominent -->
                <div
                    class="relative p-12 border-2 border-white bg-white/50 backdrop-blur-md text-center rounded-2xl shadow-[0_0_40px_rgba(255,255,255,0.3)] scale-110 z-10">
                    <div
                        class="absolute -top-4 left-1/2 -translate-x-1/2 bg-white text-cocoa text-[10px] font-bold uppercase tracking-[0.3em] px-4 py-1.5 rounded-full shadow-md">
                        ★ Más Popular</div>
                    <h3 class="text-3xl font-serif text-cocoa mb-3 mt-2">Pack 10</h3>
                    <div class="text-6xl font-bold font-serif text-cocoa mb-8">XX€</div>
                </div>
                <!-- Side card -->
                <div class="p-10 border border-white/20 bg-white/30 backdrop-blur-sm text-center rounded-2xl">
                    <h3 class="text-2xl font-serif text-white/90 mb-2">Ilimitado mensual</h3>
                    <div class="text-5xl font-serif text-white/80 mb-8">XX€</div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js" defer></script>
</body>
</html>

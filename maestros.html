            .teacher-card__name {

                z-index: 3;

                line-height: 1.02;
                text-transform: uppercase;

            .teacher-card__specialty {

                z-index: 3;

            body.teacher-modal-open {
                overflow: hidden;
            }

            .teacher-modal-overlay {
                position: fixed;
                inset: 0;
                z-index: 50;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: clamp(12px, 3vw, 36px);
                background: rgba(248, 246, 242, 0.48);

                visibility: hidden;
                backdrop-filter: blur(12px) saturate(0.72);
                transition: opacity 220ms ease, visibility 220ms ease;

            .teacher-modal-overlay.is-hidden {
                display: none;
            }

            .teacher-modal-overlay.is-open {
                opacity: 1;
                visibility: visible;
            }

            .teacher-modal {
                position: relative;
                width: min(980px, calc(100vw - 32px));
                max-height: calc(100svh - 32px);

                transition: transform 220ms ease;

            .teacher-modal-overlay.is-open .teacher-modal {
                transform: translateY(0) scale(1);
            }

            .teacher-modal__close {
                position: absolute;
                z-index: 5;
                top: 15px;
                right: 16px;
                display: inline-flex;
                align-items: center;
                justify-content: center;
                width: 38px;
                height: 38px;
                padding: 0;
                border: 1px solid rgba(255, 255, 255, 0.24);
                border-radius: 999px;
                color: #fff;
                background: rgba(255, 255, 255, 0.1);
                font-size: 1.15rem;
                cursor: pointer;
                transition: color 160ms ease, background 160ms ease, transform 160ms ease;
            }

            .teacher-modal__close:hover,
            .teacher-modal__close:focus-visible {
                color: #9b572c;
                background: #fff;
                outline: none;
                transform: rotate(4deg);

            .teacher-modal__layout {
                display: grid;
                grid-template-columns: minmax(0, 0.92fr) minmax(0, 1.08fr);
                min-height: 440px;
                font-family: 'Montserrat Arabic', Montserrat, sans-serif;

            .teacher-modal__profile {
                position: relative;
                display: grid;
                grid-template-rows: auto minmax(220px, 1fr) auto;
                min-width: 0;
                padding: 28px 24px 22px clamp(30px, 4vw, 48px);

            .teacher-modal__identity {
                position: relative;
                z-index: 2;
                padding-right: 6px;
            }

            .teacher-modal__name {
                margin: 0;
                font-size: clamp(1.65rem, 2.5vw, 2.15rem);
                font-weight: 800;
                letter-spacing: 0.01em;
                line-height: 0.98;
                text-transform: uppercase;
            }

            .teacher-modal__specialty {
                max-width: 390px;
                margin: 0.35rem 0 0;

            .teacher-modal__portrait-stage {
                display: flex;
                align-items: flex-end;
                justify-content: center;
                min-height: 0;
                overflow: hidden;
            }

            .teacher-modal__portrait {
                display: block;
                width: min(100%, 370px);
                max-height: 285px;
                object-fit: contain;
                object-position: center bottom;

            .teacher-modal__quote {
                position: relative;
                z-index: 2;

            .teacher-modal__details {
                display: flex;
                flex-direction: column;
                justify-content: center;

            .teacher-modal__section {
                min-width: 0;

            .teacher-modal__section-title,
            .teacher-modal__location {
                display: flex;
                align-items: center;
                gap: 0.38rem;
                margin: 0 0 0.32rem;
                color: #fff;
                font-size: 0.74rem;
                font-weight: 800;
                letter-spacing: 0.015em;
                line-height: 1.1;
                text-transform: uppercase;
            }

            .teacher-modal__section-title i,
            .teacher-modal__location i {
                flex: 0 0 auto;
                font-size: 1.05rem;
            }

            .teacher-modal__section-text {
                margin: 0;
                font-size: clamp(0.69rem, 1.02vw, 0.79rem);
                font-weight: 600;
                line-height: 1.28;
            }

            .teacher-modal__meta {
                display: flex;
                flex-wrap: wrap;
                gap: 0.65rem 1.15rem;
                padding-top: 0.1rem;
            }

            .teacher-modal__location {
                margin: 0;
            }

            .teacher-modal__location span {
                line-height: 1.2;

                    max-height: calc(100svh - 16px);
                    border-radius: 22px;
                }

                .teacher-modal__close {
                    top: 12px;
                    right: 12px;
                    width: 34px;
                    height: 34px;

                .teacher-modal__layout {
                    grid-template-columns: minmax(0, 1fr);
                    grid-template-rows: minmax(210px, 31svh) auto;
                    min-height: 0;
                }

                .teacher-modal__profile {
                    grid-template-rows: auto 1fr auto;
                    min-height: 210px;
                    padding: 22px 18px 12px;
                    overflow: hidden;
                }

                .teacher-modal__identity,
                .teacher-modal__quote {
                    width: 58%;
                }

                .teacher-modal__name {
                    font-size: clamp(1.25rem, 6.4vw, 1.7rem);
                }

                .teacher-modal__specialty {
                    font-size: 0.68rem;
                }

                .teacher-modal__portrait-stage {
                    position: absolute;
                    right: 2px;
                    bottom: 0;
                    width: 48%;
                    height: 88%;
                    justify-content: flex-end;
                }

                .teacher-modal__portrait {
                    width: 100%;
                    max-height: 100%;
                }

                .teacher-modal__quote {
                    align-self: end;
                    margin-top: 0.5rem;
                    font-size: 0.64rem;
                }

                .teacher-modal__details {
                    gap: 10px;
                    padding: 14px 18px 18px;
                }

                .teacher-modal__section-title,
                .teacher-modal__location {
                    margin-bottom: 0.22rem;
                    font-size: 0.66rem;
                }

                .teacher-modal__section-title i,
                .teacher-modal__location i {
                    font-size: 0.9rem;

                .teacher-modal__section-text {
                    font-size: 0.66rem;

                .teacher-modal__layout {

                .teachers-gallery__grid--4 .teacher-card:nth-child(3) .teacher-card__portrait { max-width: 280px; }

            @media (max-width: 900px) {

                .teachers-hero__portrait--left-bottom {

            @media (max-width: 640px) {

        <script>
// INLINED i18n.js
const translations = {
    es: {

function applyTranslations() {

            }

            return `
                <svg class="absolute top-2 right-2 w-10 h-10 text-[#C28E38] z-10 pointer-events-none" viewBox="0 0 50 50" fill="currentColor">
                    <path d="M25 0 C25 15, 35 25, 50 25 C35 25, 25 35, 25 50 C25 35, 15 25, 0 25 C15 25, 25 15, 25 0 Z" />
                </svg>
            `;
        }

        function getTeacherPhoto(nombre) {
            const n = (nombre || '').toLowerCase();
            if (n.includes('ángel') || n.includes('angel')) return 'img/maestro-angel-recortado.png';
            if (n.includes('miriam')) return 'img/maestra-miriam-recortada.png';
            if (n.includes('yanira')) return 'img/maestra-yanira-recortada.png';
            return 'img/maestra-silvia-recortada.png';
        }

        function getTeacherCutoutPhoto(nombre) {
            const n = (nombre || '').toLowerCase();
            if (n.includes('ángel') || n.includes('angel')) return 'img/maestro-angel-recortado.png';
            if (n.includes('miriam')) return 'img/maestra-miriam-recortada.png';
            if (n.includes('yanira')) return 'img/maestra-yanira-recortada.png';
            return 'img/maestra-silvia-recortada.png';
        }

        function renderProfesionalesLanding(profesionales) {
            const container = document.getElementById('landing-profesores-container');
            if (!container) return;
            container.innerHTML = '';

            if (!profesionales || profesionales.length === 0) {
                container.className = 'teachers-gallery__grid teachers-gallery__grid--1';
                container.innerHTML = `<div class="text-center text-[#744833]/70 italic py-10 font-bold" data-i18n="teachers_no_category">
                    ${t('teachers_no_category')}
                </div>`;
                return;
            }

            container.className = `teachers-gallery__grid teachers-gallery__grid--${Math.min(profesionales.length, 4)}`;

            profesionales.forEach((prof, index) => {
                const nombre = prof.nombre || 'PROFESOR';
                const especialidadTexto = getEspecialidadTexto(prof.especialidad) || t('teachers_fallback_spec');
                const doodlesSvg = getTeacherDoodlesSvg(nombre);
                const photoUrl = prof.foto_cutout || getTeacherPhoto(nombre);

                const card = document.createElement('div');
                card.className = 'teacher-card group';
                card.onclick = () => openTeacherModal(prof);
                card.tabIndex = 0;
                card.setAttribute('role', 'button');
                card.setAttribute('aria-label', `${t('teachers_view_card')} ${nombre}`);
                card.addEventListener('keydown', (event) => {
                    if (event.key === 'Enter' || event.key === ' ') {
                        event.preventDefault();
                        openTeacherModal(prof);
                    }
                });

                card.innerHTML = `
                    <div class="teacher-card__figure">
                        ${doodlesSvg}
                        <img src="${escapeHtmlPublic(photoUrl)}" alt="Retrato en blanco y negro de ${escapeHtmlPublic(nombre)}" class="teacher-card__portrait" loading="lazy" />
                    </div>

                    <h3 class="teacher-card__name">${escapeHtmlPublic(nombre)}</h3>
                    <p class="teacher-card__specialty">${escapeHtmlPublic(especialidadTexto)}</p>
                `;

                container.appendChild(card);
            });
        }

        function parseBio(text) {
            const sections = { lugar: '', titulos: [], sobreMi: [], teAcompano: [], meDefine: '' };
            if (!text) return sections;
            const normalized = text.replace(/\r\n/g, '\n');
            const parts = normalized.split(/(?:^|\n)\s*(LUGAR DE NACIMIENTO|TITULACIONES|SOBRE MI|SOBRE MÍ|TRAYECTORIA|TE ACOMPAÑO|ME DEFINE|BACKGROUND|QUALIFICATIONS|ABOUT ME|I SUPPORT YOU|WHAT DEFINES ME):\s*/i);

            for (let i = 1; i < parts.length; i += 2) {
                const header = parts[i].toUpperCase();
                const content = parts[i + 1] ? parts[i + 1].trim() : '';
                if (header.includes('LUGAR')) sections.lugar = content.replace(/,$/, '').trim();
                else if (header.includes('TITULACION') || header.includes('QUALIFICATION')) sections.titulos = content.split('\n').map(l => l.replace(/^[\s*\-•]+/g, '').trim()).filter(Boolean);
                else if (header.includes('SOBRE') || header.includes('TRAYECTORIA') || header.includes('ABOUT') || header.includes('BACKGROUND')) sections.sobreMi = content.split('\n').map(p => p.trim()).filter(Boolean);
                else if (header.includes('ACOMPA') || header.includes('SUPPORT')) sections.teAcompano = content.split('\n').map(l => l.replace(/^[\s*\-•]+/g, '').trim()).filter(Boolean);
                else if (header.includes('DEFINE')) sections.meDefine = content.replace(/^["'“”«»]+/g, '').replace(/["'“”«»]+$/g, '').trim();
            }
            return sections;
        }

        function cleanModalText(text) {
            return String(text || '')
                .replace(/^[\s*\-•]+/g, '')
                .replace(/\s+/g, ' ')
                .replace(/\s+([,.;:])/g, '$1')
                .trim();
        }

        function summarizeModalText(text, maxWords) {
            const clean = cleanModalText(text);
            if (!clean) return '';
            const words = clean.split(' ');
            if (words.length <= maxWords) return clean;

            let summary = words.slice(0, maxWords).join(' ');
            const lastSentence = Math.max(summary.lastIndexOf('.'), summary.lastIndexOf(';'));
            if (lastSentence > summary.length * 0.58) {
                summary = summary.slice(0, lastSentence + 1);
            } else {
                summary = `${summary.replace(/[,.;:]$/, '')}…`;
            }
            return summary;
        }

        function summarizeModalItems(items, maxItems, maxWordsPerItem, moreLabel, singleItemWords = maxWordsPerItem) {
            const entries = (items || [])
                .flatMap(item => String(item || '').split(/\n|•/))
                .map(cleanModalText)
                .filter(Boolean)
                .filter(item => !/^(áreas? de acompañamiento|areas? of support):?$/i.test(item));

            const visible = entries.slice(0, maxItems).map(item => summarizeModalText(
                item,
                entries.length === 1 ? singleItemWords : maxWordsPerItem
            ));
            const remaining = Math.max(0, entries.length - visible.length);
            const suffix = remaining ? ` · +${remaining} ${moreLabel}` : '';
            return `${visible.join(' · ')}${suffix}`;
        }

        function getTeacherModalCopy() {
            if (window.currentLang === 'en') {
                return {
                    about: 'About me',
                    qualifications: 'Qualifications',
                    sessions: 'Session focus',
                    moreQualifications: 'more qualifications',
                    moreAreas: 'more areas',
                    close: 'Close teacher profile'
                };
            }
            return {
                about: 'Sobre mí',
                qualifications: 'Titulaciones',
                sessions: 'Ámbitos de sesión',
                moreQualifications: 'formaciones más',
                moreAreas: 'áreas más',
                close: 'Cerrar ficha del maestro'
            };
        }

        function renderTeacherModalSection(icon, title, text) {
            if (!text) return '';
            return `
                <section class="teacher-modal__section">
                    <h4 class="teacher-modal__section-title">
                        <i class="ph-fill ${icon}" aria-hidden="true"></i>
                        <span>${escapeHtmlPublic(title)}</span>
                    </h4>
                    <p class="teacher-modal__section-text">${escapeHtmlPublic(text)}</p>
                </section>
            `;
        }

        function openTeacherModal(prof) {
            const overlay = document.getElementById('teacher-modal-overlay');
            const body = document.getElementById('teacher-modal-body');
            if (!overlay || !body) return;

            const rawBio = prof.descripcion || prof.bio || '';
            const parsed = parseBio(rawBio);
            const copy = getTeacherModalCopy();
            const nombre = prof.nombre || 'Profesor';
            const esp = getEspecialidadTexto(prof.especialidad) || 'GEN Yoga';
            const photoUrl = getTeacherCutoutPhoto(nombre);
            const aboutSource = parsed.sobreMi.length ? parsed.sobreMi.join(' ') : rawBio;
            const aboutText = summarizeModalText(aboutSource || esp, 42);
            const qualificationsText = summarizeModalItems(parsed.titulos, 3, 16, copy.moreQualifications, 32);
            const sessionsText = parsed.teAcompano.length
                ? summarizeModalItems(parsed.teAcompano, 4, 13, copy.moreAreas, 42)
                : summarizeModalText(esp, 20);
            const quoteText = summarizeModalText(parsed.meDefine, 20);
            const locationText = summarizeModalText(parsed.lugar, 12);

            body.innerHTML = `
                <div class="teacher-modal__layout">
                    <div class="teacher-modal__profile">
                        <div class="teacher-modal__identity">
                            <h3 id="teacher-modal-name" class="teacher-modal__name">${escapeHtmlPublic(nombre)}</h3>
                            <p class="teacher-modal__specialty">${escapeHtmlPublic(esp)}</p>
                        </div>

                        <div class="teacher-modal__portrait-stage">
                            <img src="${escapeHtmlPublic(photoUrl)}" alt="Retrato en blanco y negro de ${escapeHtmlPublic(nombre)}" class="teacher-modal__portrait" />
                        </div>

                        ${quoteText ? `<p class="teacher-modal__quote">“${escapeHtmlPublic(quoteText)}”</p>` : '<span aria-hidden="true"></span>'}
                    </div>

                    <div class="teacher-modal__details">
                        ${renderTeacherModalSection('ph-user', copy.about, aboutText)}
                        ${renderTeacherModalSection('ph-graduation-cap', copy.qualifications, qualificationsText)}
                        ${renderTeacherModalSection('ph-heart', copy.sessions, sessionsText)}
                        ${locationText ? `
                            <div class="teacher-modal__meta">
                                <p class="teacher-modal__location">
                                    <i class="ph-fill ph-map-pin" aria-hidden="true"></i>
                                    <span>${escapeHtmlPublic(locationText)}</span>
                                </p>
                            </div>
                        ` : ''}
                    </div>
                </div>
            `;

            clearTimeout(teacherModalCloseTimer);
            lastTeacherModalTrigger = document.activeElement instanceof HTMLElement ? document.activeElement : null;
            overlay.classList.remove('is-hidden');
            overlay.setAttribute('aria-hidden', 'false');
            overlay.querySelector('.teacher-modal__close')?.setAttribute('aria-label', copy.close);
            document.body.classList.add('teacher-modal-open');

            requestAnimationFrame(() => {
                overlay.classList.add('is-open');
                overlay.querySelector('.teacher-modal__close')?.focus();
            });
        }

        function closeTeacherModal() {
            const overlay = document.getElementById('teacher-modal-overlay');
            if (!overlay || overlay.classList.contains('is-hidden')) return;

            overlay.classList.remove('is-open');
            overlay.setAttribute('aria-hidden', 'true');
            document.body.classList.remove('teacher-modal-open');
            clearTimeout(teacherModalCloseTimer);
            teacherModalCloseTimer = setTimeout(() => overlay.classList.add('is-hidden'), 220);

            if (lastTeacherModalTrigger?.isConnected) {
                lastTeacherModalTrigger.focus();
            }
        }

        function handleTeacherModalBackdrop(event) {
            if (event.target?.id === 'teacher-modal-overlay') closeTeacherModal();
        }

        document.addEventListener('DOMContentLoaded', () => {
            let langDiv = document.getElementById('floating-lang-selector');
            if (!langDiv) {
                langDiv = document.createElement('div');
                langDiv.id = 'floating-lang-selector';
                langDiv.style.cssText = 'position:fixed;top:16px;right:24px;z-index:9998;background-color:#795244;border:1px solid rgba(248, 246, 242, 0.15);border-radius:9999px;padding:4px 10px;display:flex;align-items:center;gap:4px;font-size:11px;color:#f8f6f2;box-shadow:0 6px 16px rgba(38, 22, 12, 0.2);user-select:none;font-family:system-ui, -apple-system, sans-serif;pointer-events:auto;';
                langDiv.innerHTML = `
                    <button id="lang-btn-es" style="cursor:pointer; font-family:inherit; border:none; background:none; padding:2px 6px; outline:none; font-weight:900; text-decoration:underline; text-decoration-thickness:2px; text-underline-offset:4px; color:#f8f6f2; opacity:1;">ES</button>
                    <span style="color:rgba(248, 246, 242, 0.25); font-size:11px; pointer-events:none;">/</span>
                    <button id="lang-btn-en" style="cursor:pointer; font-family:inherit; border:none; background:none; padding:2px 6px; outline:none; font-weight:500; text-decoration:none; color:#f8f6f2; opacity:0.5;">EN</button>
                `;
                document.body.appendChild(langDiv);
            }

            const btnEs = document.getElementById('lang-btn-es');
            const btnEn = document.getElementById('lang-btn-en');
            if (btnEs) btnEs.addEventListener('click', () => setLanguage('es'));
            if (btnEn) btnEn.addEventListener('click', () => setLanguage('en'));

            setLanguage(currentLang);
            fetchProfesionalesLanding();
        });

        document.addEventListener('keydown', (event) => {
            if (event.key === 'Escape') closeTeacherModal();
        });
        </script>
    </body>
</html>

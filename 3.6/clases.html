<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEN Yoga | Clases</title>
    <link rel="stylesheet" href="tailwind-compiled.css">

    <script src="https://unpkg.com/lucide@latest" defer></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    </head>
<body class="subpixel-antialiased min-h-screen w-screen overflow-x-hidden relative selection:bg-mutedgold selection:text-cocoa font-sans">

    
    <!-- Background Gradient: Inspired by user image (Terracotta, Gold, Olive) -->
    <div class="fixed inset-0 z-0 bg-[linear-gradient(to_bottom,_#C3B89A_0%,_#AB593D_40%,_#8F6B2D_70%,_#6A6540_100%)]">
    </div>

    <!-- Inner Glow/Highlight to mimic the center spotlight effect -->
    <div class="fixed inset-0 z-0 bg-[radial-gradient(circle_at_center,rgba(255,255,255,0.15)_0%,transparent_50%)] pointer-events-none">
    </div>

    <!-- Ambient background shapes (ZEN & FRESH) -->
    <div id="parallax-bg" class="fixed inset-0 z-0 pointer-events-none overflow-hidden transition-transform duration-1000 ease-out">
        <div class="ambient-shape shape-1"></div>
        <div class="ambient-shape shape-2"></div>
        <div class="ambient-shape shape-3"></div>
        <div class="ambient-shape shape-4"></div>
    </div>


    <div class="min-h-screen flex flex-col items-center p-4 md:p-8 pt-20 md:pt-24 relative z-10 w-full max-w-5xl mx-auto">
        <a href="index.html"
            class="absolute top-6 left-6 z-20 bg-terracotta backdrop-blur-md border border-terracotta text-white px-6 py-3 rounded-xl font-bold text-[10px] md:text-xs uppercase tracking-widest hover:bg-cocoa transition shadow-lg hover:scale-105 active:scale-95 flex items-center gap-2 group">
            <i class="ph-bold ph-arrow-left group-hover:-translate-x-1 transition"></i> Volver a inicio
        </a>

        <div class="w-full bg-white/10 backdrop-blur-xl rounded-3xl p-6 md:p-12 border border-white/20 shadow-2xl mt-12 md:mt-8 text-cocoa">
            <h2 class="brand-font text-3xl md:text-5xl lg:text-7xl text-center text-white mb-8 md:mb-12 drop-shadow-md">
                Clases del Centro
            </h2>

            <!-- Seccion Calendario Oficial Descargable -->
            <div class="mb-12 flex flex-col items-center w-full">
                <div class="w-full max-w-3xl bg-white/5 backdrop-blur-md border border-white/10 rounded-2xl p-4 md:p-6 shadow-xl flex flex-col items-center gap-4 text-center">
                    <span class="inline-flex py-1 px-3 rounded-full bg-white/10 text-white font-bold tracking-widest text-[10px] uppercase border border-white/20">
                        Horario Oficial
                    </span>
                    <p class="text-white/80 text-sm max-w-md font-light leading-relaxed">
                        Haz clic sobre la imagen o pulsa el botón inferior para descargar el horario oficial en tu móvil o PC.
                    </p>
                    
                    <!-- Contenedor Interactivo de la Imagen -->
                    <div class="relative group cursor-pointer overflow-hidden rounded-xl border border-white/10 shadow-lg w-full aspect-[16/10] bg-white/5">
                        <a id="link-img-horario" href="img_calendario/horario.jpg" download="Horario_GEN_Yoga.jpg" class="block w-full h-full download-link">
                            <img id="img-horario-oficial" src="img_calendario/horario.jpg" alt="Horario Oficial" 
                                 class="w-full h-full object-cover transition-all duration-500 group-hover:scale-102 group-hover:brightness-90"
                                 onload="document.querySelectorAll('.download-link').forEach(a => { a.href = this.src; if (this.src.includes('clases.png')) { a.removeAttribute('download'); } else { a.setAttribute('download', 'Horario_GEN_Yoga.' + this.src.split('.').pop()); } });"
                                 onerror="if (this.src.includes('horario.png')) { this.src='img_calendario/horario.jpg'; } else if (this.src.includes('horario.jpg')) { this.src='img_calendario/horario.jpeg'; } else { this.src='img/clases.png'; this.onerror=null; }">
                            <!-- Capa de superposición al pasar el ratón -->
                            <div class="absolute inset-0 bg-cocoa/40 opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-center justify-center pointer-events-none">
                                <span class="bg-terracotta text-white px-5 py-2.5 rounded-full font-bold text-xs uppercase tracking-widest shadow-lg transform scale-90 group-hover:scale-100 transition duration-300 flex items-center gap-2">
                                    <i class="ph-bold ph-download-simple text-base"></i> Descargar
                                </span>
                            </div>
                        </a>
                    </div>
                    
                    <!-- Botón de Descarga Directa -->
                    <div class="flex gap-4 flex-wrap justify-center mt-2">
                        <a href="img_calendario/horario.png" download="Horario_GEN_Yoga.png" 
                           class="download-link flex bg-terracotta hover:bg-cocoa border border-terracotta/20 text-white px-6 py-3 rounded-xl font-bold text-xs uppercase tracking-widest hover:scale-105 active:scale-95 transition shadow-lg items-center gap-2">
                            <i class="ph-bold ph-download-simple text-base"></i> Descargar Horario
                        </a>
                    </div>
                </div>
            </div>
            
            <!-- Sub-pestañas de filtrado de sesiones -->
            <div class="flex justify-center gap-2 mb-12 flex-wrap">
                <button id="btn-filtro-clases-todos" onclick="filtrarClasesLanding('todos')"
                    class="px-5 py-2.5 text-xs uppercase tracking-wider font-bold rounded-full bg-white text-cocoa transition border border-white/20 shadow-sm hover:scale-105 active:scale-95">
                    Todas
                </button>
                <button id="btn-filtro-clases-yoga" onclick="filtrarClasesLanding('yoga')"
                    class="px-5 py-2.5 text-xs uppercase tracking-wider font-bold rounded-full bg-white/20 text-white hover:bg-white/30 transition border border-white/10 hover:scale-105 active:scale-95">
                    Clases
                </button>
                <button id="btn-filtro-clases-psicologia" onclick="filtrarClasesLanding('psicologia')"
                    class="px-5 py-2.5 text-xs uppercase tracking-wider font-bold rounded-full bg-white/20 text-white hover:bg-white/30 transition border border-white/10 hover:scale-105 active:scale-95">
                    Consultas
                </button>
                <button id="btn-filtro-clases-nutricion" onclick="filtrarClasesLanding('nutricion')"
                    class="px-5 py-2.5 text-xs uppercase tracking-wider font-bold rounded-full bg-white/20 text-white hover:bg-white/30 transition border border-white/10 hover:scale-105 active:scale-95">
                    Talleres
                </button>
            </div>

            <div id="landing-clases-container"
                class="space-y-6 [&>*]:bg-white/80 [&>*]:backdrop-blur-sm [&>*]:rounded-xl [&>*]:border-white/10">
                <!-- Clases dinámicas aquí -->
            </div>
        </div>
    </div>

    <script src="app.js" defer></script>
</body>
</html>

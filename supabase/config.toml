# Stripe calls this endpoint directly and authenticates with its signature.
[functions.stripe-webhook]
verify_jwt = false

# The current guest checkout flow invokes these functions without a user JWT.
# Each function must perform its own request and Stripe-resource validation.
[functions.create-checkout-session]
verify_jwt = false

[functions.get-checkout-session]
verify_jwt = false

[functions.book-guest-class]
verify_jwt = false

[functions.create-portal-session]
verify_jwt = false

# The kiosk flow requires a signed-in administrator. The function repeats the
# token and role checks before using the service role.
[functions.create-kiosk-user]
verify_jwt = true

# Destructive account operations require a valid user JWT. The function also
# validates that token explicitly and only elevates database calls server-side.
[functions.delete-account]
verify_jwt = true
